<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeFlow 支持</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7fbfd;
      --card: #ffffff;
      --text: #142033;
      --muted: #657587;
      --accent: #0b9583;
      --border: #d7e3ec;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1118;
        --card: #17212c;
        --text: #f4f8fc;
        --muted: #9bacbc;
        --accent: #55dbc6;
        --border: #2b3a49;
      }
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.15;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    .card {
      margin-top: 22px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }
    a {
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    ul {
      margin: 12px 0 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>TimeFlow</h1>
    <p>本地优先的活动计时和时间记录 App。</p>

    <section class="card">
      <h2>支持</h2>
      <p>如果你在使用 TimeFlow 时遇到问题，请联系：</p>
      <p><a href="mailto:timeflowsupport@163.com">timeflowsupport@163.com</a></p>
    </section>

    <section class="card">
      <h2>文档</h2>
      <ul>
        <li><a href="privacy.html">隐私政策</a></li>
        <li><a href="support.html">支持页面</a></li>
        <li><a href="terms.html">使用条款</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
